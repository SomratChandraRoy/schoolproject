apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: schoolproject
type: Opaque
stringData:
  DJANGO_SECRET_KEY: replace-with-a-strong-secret
  AUTO_CREATE_SUPERUSER: "False"
  DJANGO_SUPERUSER_USERNAME:
  DJANGO_SUPERUSER_PASSWORD:
  DJANGO_SUPERUSER_EMAIL: admin@medhabangla.local
  DB_NAME: medhabangla_db
  DB_USER: medhabangla_user
  DB_PASSWORD: replace-with-a-strong-password
  DB_HOST: postgres
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0

  # Monitoring
  SENTRY_DSN: https://your-sentry-dsn

  # WorkOS
  WORKOS_API_KEY: replace-me
  WORKOS_CLIENT_ID: replace-me
  WORKOS_REDIRECT_URI: https://bipulroy.me/auth/callback

  # Stripe
  STRIPE_SECRET_KEY: replace-me
  STRIPE_WEBHOOK_SECRET: replace-me
  STRIPE_PUBLISHABLE_KEY: replace-me

  # AI providers
  GROQ_API_KEY: replace-me
  ALIBABA_API_KEY: replace-me
  GEMINI_API_KEY: replace-me
  GEMINI_API_KEYS: replace-me-if-using-multiple
  DEEPGRAM_API_KEY: replace-me
  SARVAM_API_KEY: replace-me

  # 8x8 JaaS
  JAAS_APP_ID: replace-me
  JAAS_KID: replace-me
  JAAS_PRIVATE_KEY: replace-me

  # Google Drive PDF storage
  USE_GOOGLE_DRIVE: "True"
  # One-line JSON only. Do not wrap the whole value in single quotes.
  # Keep private_key new lines escaped as \n inside JSON.
  GOOGLE_DRIVE_CREDENTIALS_JSON: replace-with-service-account-json
  GOOGLE_DRIVE_FOLDER_ID: replace-with-drive-folder-id
  GOOGLE_DRIVE_BOOKS_FOLDER_ID: replace-with-books-folder-id
  GOOGLE_DRIVE_PUBLIC_FILES: "True"
