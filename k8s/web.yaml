apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-media
  namespace: schoolproject
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: schoolproject
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: schoolproject
spec:
  replicas: 1
  # This deployment mounts a ReadWriteOnce PVC; Recreate avoids rollout hangs caused by
  # surge pods competing for the same volume attachment.
  strategy:
    type: Recreate
  progressDeadlineSeconds: 1800
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # Backend runs as non-root inside the image and needs write access to mounted
      # media/static volumes for collectstatic and uploads.
      initContainers:
        - name: init-web-volume-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /app/media /app/staticfiles && chmod -R 0777 /app/media /app/staticfiles
          volumeMounts:
            - name: backend-media
              mountPath: /app/media
            - name: backend-static
              mountPath: /app/staticfiles
      imagePullSecrets:
        - name: docr-auth
      containers:
        - name: backend
          image: registry.digitalocean.com/replace-me/schoolproject-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          volumeMounts:
            - name: backend-media
              mountPath: /app/media
            - name: backend-static
              mountPath: /app/staticfiles
          startupProbe:
            tcpSocket:
              port: 8000
            # Backend startup runs migrations + collectstatic before opening port 8000.
            # Allow longer warm-up to avoid premature restart loops.
            failureThreshold: 360
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1.5Gi

        - name: nginx
          image: registry.digitalocean.com/replace-me/schoolproject-nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: backend-media
              mountPath: /app/media
            - name: backend-static
              mountPath: /app/staticfiles
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 750m
              memory: 512Mi

      volumes:
        - name: backend-media
          persistentVolumeClaim:
            claimName: backend-media
        - name: backend-static
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
