<!DOCTYPE html>
<html>

<head>
    <title>Generate PWA Icons</title>
</head>

<body>
    <h1>Generating PWA Icons...</h1>
    <canvas id="canvas192" width="192" height="192" style="display:none;"></canvas>
    <canvas id="canvas512" width="512" height="512" style="display:none;"></canvas>
    <div id="status"></div>

    <script>
        function createIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#2563eb');
            gradient.addColorStop(1, '#9333ea');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // Add text
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.3}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('MB', size / 2, size / 2);

            // Convert to blob and download
            canvas.toBlob(function (blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
                document.getElementById('status').innerHTML += `<p>✓ Generated icon-${size}.png</p>`;
            });
        }

        // Generate both icons
        createIcon('canvas192', 192);
        setTimeout(() => createIcon('canvas512', 512), 500);

        document.getElementById('status').innerHTML = '<p>Generating icons... Check your downloads folder.</p>';
    </script>
</body>

</html>
