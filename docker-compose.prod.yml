version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: medhabangla_db
      POSTGRES_USER: medhabangla_user
      POSTGRES_PASSWORD: medhabangla_password
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    command: gunicorn medhabangla.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - DEBUG=0
      - DATABASE_URL=postgresql://medhabangla_user:medhabangla_password@db:5432/medhabangla_db
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/medhabangla
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_build:/usr/share/nginx/html
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    build: 
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - frontend_build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl  # Uncomment for SSL certificates
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
  frontend_build: