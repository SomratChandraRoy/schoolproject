name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Django health check
        env:
          USE_SQLITE: "True"
          DEBUG: "True"
          DJANGO_SECRET_KEY: ci-temporary-secret
        run: python manage.py check

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/medhabangla

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/medhabangla/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  notify-sentry-on-failure:
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-build
    if: failure() && secrets.SENTRY_DSN != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sentry-sdk
        run: pip install sentry-sdk

      - name: Send CI failure event to Sentry
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_MESSAGE: "CI workflow failed"
          SENTRY_LEVEL: error
        run: python .github/scripts/notify_sentry_failure.py
