name: CD - DigitalOcean Kubernetes

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: doks-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  K8S_NAMESPACE: schoolproject
  BACKEND_IMAGE_NAME: schoolproject-backend
  NGINX_IMAGE_NAME: schoolproject-nginx
  DOCR_REGISTRY: registry.digitalocean.com/${{ secrets.DOCR_REGISTRY_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Authenticate Docker to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image metadata
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${DOCR_REGISTRY}/${BACKEND_IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=${DOCR_REGISTRY}/${BACKEND_IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${DOCR_REGISTRY}/${NGINX_IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "nginx_latest=${DOCR_REGISTRY}/${NGINX_IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.vars.outputs.backend_image }}
            ${{ steps.vars.outputs.backend_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx/frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: |
            ${{ steps.vars.outputs.nginx_image }}
            ${{ steps.vars.outputs.nginx_latest }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_SENTRY_ENVIRONMENT=${{ secrets.VITE_SENTRY_ENVIRONMENT || 'production' }}
            VITE_SENTRY_TRACES_SAMPLE_RATE=${{ secrets.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
            VITE_APP_RELEASE=${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 1200 "${{ secrets.DOKS_CLUSTER_NAME }}"

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create or update image pull secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry docr-auth \
            --docker-server=registry.digitalocean.com \
            --docker-username=doctl \
            --docker-password="${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" \
            --docker-email=noreply@github.com \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync backend environment secret from GitHub secret
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          printf '%s' "$BACKEND_ENV_FILE" > backend.env
          required_keys=(DJANGO_SECRET_KEY DB_NAME DB_USER DB_PASSWORD ALLOWED_HOSTS CORS_ALLOWED_ORIGINS CSRF_TRUSTED_ORIGINS)
          missing_keys=()
          for key in "${required_keys[@]}"; do
            if ! grep -q "^${key}=" backend.env; then
              missing_keys+=("${key}")
            fi
          done
          if [ "${#missing_keys[@]}" -gt 0 ]; then
            echo "::error title=Invalid BACKEND_ENV_FILE::Missing required keys: ${missing_keys[*]}"
            rm -f backend.env
            exit 1
          fi
          non_empty_keys=(DJANGO_SECRET_KEY DB_NAME DB_USER DB_PASSWORD ALLOWED_HOSTS CORS_ALLOWED_ORIGINS CSRF_TRUSTED_ORIGINS)
          empty_keys=()
          for key in "${non_empty_keys[@]}"; do
            value="$(grep -m1 "^${key}=" backend.env | cut -d '=' -f2-)"
            if [ -z "${value}" ]; then
              empty_keys+=("${key}")
            fi
          done
          if [ "${#empty_keys[@]}" -gt 0 ]; then
            echo "::error title=Invalid BACKEND_ENV_FILE::Empty required values: ${empty_keys[*]}"
            rm -f backend.env
            exit 1
          fi

          # Force in-cluster service connectivity from ConfigMap to avoid secret overrides
          # pointing the app to an external/unreachable DB/Redis endpoint.
          if grep -q '^DB_HOST=' backend.env; then
            echo "::warning title=BACKEND_ENV_FILE notice::DB_HOST found in BACKEND_ENV_FILE; in-cluster ConfigMap value (postgres) will be used."
          fi
          if grep -q '^DB_PORT=' backend.env; then
            echo "::warning title=BACKEND_ENV_FILE notice::DB_PORT found in BACKEND_ENV_FILE; in-cluster ConfigMap value (5432) will be used."
          fi
          if grep -q '^DB_SSLMODE=' backend.env; then
            echo "::warning title=BACKEND_ENV_FILE notice::DB_SSLMODE found in BACKEND_ENV_FILE; in-cluster ConfigMap value (prefer) will be used."
          fi
          if grep -q '^REDIS_URL=' backend.env; then
            echo "::warning title=BACKEND_ENV_FILE notice::REDIS_URL found in BACKEND_ENV_FILE; in-cluster ConfigMap value will be used."
          fi

          grep -Ev '^(DB_HOST|DB_PORT|DB_SSLMODE|DB_SSLROOTCERT|REDIS_URL)=' backend.env > backend.secret.env
          kubectl -n "${K8S_NAMESPACE}" create secret generic backend-secrets \
            --from-env-file=backend.secret.env \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f backend.env backend.secret.env

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s

      - name: Wait for persistent volumes to bind
        run: |
          kubectl -n "${K8S_NAMESPACE}" wait --for=jsonpath='{.status.phase}'=Bound pvc/postgres-data --timeout=300s
          kubectl -n "${K8S_NAMESPACE}" wait --for=jsonpath='{.status.phase}'=Bound pvc/redis-data --timeout=300s
          kubectl -n "${K8S_NAMESPACE}" wait --for=jsonpath='{.status.phase}'=Bound pvc/backend-media --timeout=300s

      - name: Update deployment images
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/web backend="${{ steps.vars.outputs.backend_image }}"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/web nginx="${{ steps.vars.outputs.nginx_image }}"
          kubectl -n "${K8S_NAMESPACE}" set env deployment/web SENTRY_RELEASE="${{ steps.vars.outputs.short_sha }}" --containers=backend

      - name: Reconcile PostgreSQL credentials with backend secret
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/postgres --timeout=900s

          DB_NAME="$(kubectl -n "${K8S_NAMESPACE}" get secret backend-secrets -o jsonpath='{.data.DB_NAME}' | base64 -d)"
          DB_USER="$(kubectl -n "${K8S_NAMESPACE}" get secret backend-secrets -o jsonpath='{.data.DB_USER}' | base64 -d)"
          DB_PASSWORD="$(kubectl -n "${K8S_NAMESPACE}" get secret backend-secrets -o jsonpath='{.data.DB_PASSWORD}' | base64 -d)"

          if [ -z "$DB_NAME" ] || [ -z "$DB_USER" ] || [ -z "$DB_PASSWORD" ]; then
            echo "::error title=Invalid backend-secrets::DB_NAME/DB_USER/DB_PASSWORD must be non-empty"
            exit 1
          fi

          escape_sql_literal() {
            printf '%s' "$1" | sed "s/'/''/g"
          }

          DB_NAME_SQL="$(escape_sql_literal "$DB_NAME")"
          DB_USER_SQL="$(escape_sql_literal "$DB_USER")"
          DB_PASSWORD_SQL="$(escape_sql_literal "$DB_PASSWORD")"

          POSTGRES_POD="$(kubectl -n "${K8S_NAMESPACE}" get pods -l app=postgres -o jsonpath='{.items[0].metadata.name}')"
          if [ -z "$POSTGRES_POD" ]; then
            echo "::error title=Postgres pod not found::Unable to locate app=postgres pod"
            exit 1
          fi

          kubectl -n "${K8S_NAMESPACE}" exec "$POSTGRES_POD" -- psql -v ON_ERROR_STOP=1 -U postgres -d postgres -c "DO \$do\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${DB_USER_SQL}') THEN EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${DB_USER_SQL}', '${DB_PASSWORD_SQL}'); ELSE EXECUTE format('ALTER ROLE %I WITH LOGIN PASSWORD %L', '${DB_USER_SQL}', '${DB_PASSWORD_SQL}'); END IF; END \$do\$;"
          kubectl -n "${K8S_NAMESPACE}" exec "$POSTGRES_POD" -- psql -v ON_ERROR_STOP=1 -U postgres -d postgres -c "DO \$do\$ BEGIN IF NOT EXISTS (SELECT FROM pg_database WHERE datname = '${DB_NAME_SQL}') THEN EXECUTE format('CREATE DATABASE %I OWNER %I', '${DB_NAME_SQL}', '${DB_USER_SQL}'); END IF; END \$do\$;"
          kubectl -n "${K8S_NAMESPACE}" exec "$POSTGRES_POD" -- psql -v ON_ERROR_STOP=1 -U postgres -d postgres -c "DO \$do\$ BEGIN EXECUTE format('GRANT ALL PRIVILEGES ON DATABASE %I TO %I', '${DB_NAME_SQL}', '${DB_USER_SQL}'); END \$do\$;"

      - name: Wait for rollout
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/postgres --timeout=900s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/redis --timeout=900s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/web --timeout=1800s

      - name: Collect Kubernetes diagnostics on failure
        if: ${{ failure() }}
        run: |
          set +e
          echo "==== Deployments ===="
          kubectl -n "${K8S_NAMESPACE}" get deployments -o wide
          echo "==== Pods ===="
          kubectl -n "${K8S_NAMESPACE}" get pods -o wide
          echo "==== Web pod state reasons (quick root cause) ===="
          kubectl -n "${K8S_NAMESPACE}" get pods -l app=web -o jsonpath='{range .items[*]}POD: {.metadata.name}{"\n"}{range .status.initContainerStatuses[*]}  INIT {.name}: {.state.waiting.reason}{" "}{.state.waiting.message}{"\n"}{end}{range .status.containerStatuses[*]}  CONTAINER {.name}: {.state.waiting.reason}{" "}{.state.waiting.message}{"\n"}{end}{"\n"}{end}'
          echo "==== PVCs ===="
          kubectl -n "${K8S_NAMESPACE}" get pvc
          echo "==== Recent events ===="
          kubectl -n "${K8S_NAMESPACE}" get events --sort-by=.lastTimestamp | tail -n 120

          echo "==== Describe postgres/redis/web deployments ===="
          kubectl -n "${K8S_NAMESPACE}" describe deployment/postgres
          kubectl -n "${K8S_NAMESPACE}" describe deployment/redis
          kubectl -n "${K8S_NAMESPACE}" describe deployment/web

          echo "==== Describe postgres/redis/web pods ===="
          kubectl -n "${K8S_NAMESPACE}" describe pods -l app=postgres
          kubectl -n "${K8S_NAMESPACE}" describe pods -l app=redis
          kubectl -n "${K8S_NAMESPACE}" describe pods -l app=web

          for pod in $(kubectl -n "${K8S_NAMESPACE}" get pods -l app=postgres -o jsonpath='{.items[*].metadata.name}'); do
            echo "---- Logs: ${pod} ----"
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" --tail=200 || true
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" --previous --tail=200 || true
          done
          for pod in $(kubectl -n "${K8S_NAMESPACE}" get pods -l app=redis -o jsonpath='{.items[*].metadata.name}'); do
            echo "---- Logs: ${pod} ----"
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" --tail=200 || true
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" --previous --tail=200 || true
          done
          for pod in $(kubectl -n "${K8S_NAMESPACE}" get pods -l app=web -o jsonpath='{.items[*].metadata.name}'); do
            echo "---- Logs backend: ${pod} ----"
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" -c backend --tail=200 || true
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" -c backend --previous --tail=200 || true
            echo "---- Logs nginx: ${pod} ----"
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" -c nginx --tail=200 || true
            kubectl -n "${K8S_NAMESPACE}" logs "${pod}" -c nginx --previous --tail=200 || true
          done

      - name: Decide Sentry release step
        id: sentry_release_flags
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ] && [ -n "$SENTRY_ORG" ] && [ -n "$SENTRY_PROJECT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sentry release tracking
        if: ${{ steps.sentry_release_flags.outputs.enabled == 'true' }}
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ steps.vars.outputs.short_sha }}

      - name: Send deployment failure event to Sentry
        if: ${{ failure() }}
        run: |
          python -m pip install sentry-sdk
          python .github/scripts/notify_sentry_failure.py
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_MESSAGE: "CD workflow failed"
          SENTRY_LEVEL: error
