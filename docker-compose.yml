version: "3.8"

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: medhabangla_db
      POSTGRES_USER: medhabangla_user
      POSTGRES_PASSWORD: medhabangla_password
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py loaddata initial_data.json && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://medhabangla_user:medhabangla_password@db:5432/medhabangla_db
      - JAAS_DOMAIN=${JAAS_DOMAIN:-8x8.vc}
      - JAAS_APP_ID=${JAAS_APP_ID:-}
      - JAAS_KID=${JAAS_KID:-}
      - JAAS_PRIVATE_KEY=${JAAS_PRIVATE_KEY:-}
      - JAAS_JWT_TTL_SECONDS=${JAAS_JWT_TTL_SECONDS:-3600}
      - JAAS_REQUIRE_AUTH_TOKEN=${JAAS_REQUIRE_AUTH_TOKEN:-False}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend/medhabangla
      dockerfile: Dockerfile.frontend
    volumes:
      - ./frontend/medhabangla:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
