services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medhabangla_db}
      POSTGRES_USER: ${POSTGRES_USER:-medhabangla_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medhabangla_password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-medhabangla_user} -d ${POSTGRES_DB:-medhabangla_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: sh /app/entrypoint.dev.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=True
      - DOCKER_ENV=True
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-medhabangla_db}
      - DB_USER=${POSTGRES_USER:-medhabangla_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-medhabangla_password}
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOW_ALL_ORIGINS=True
      - JAAS_DOMAIN=${JAAS_DOMAIN:-8x8.vc}
      - JAAS_APP_ID=${JAAS_APP_ID:-}
      - JAAS_KID=${JAAS_KID:-}
      - JAAS_PRIVATE_KEY=${JAAS_PRIVATE_KEY:-}
      - JAAS_JWT_TTL_SECONDS=${JAAS_JWT_TTL_SECONDS:-3600}
      - JAAS_REQUIRE_AUTH_TOKEN=${JAAS_REQUIRE_AUTH_TOKEN:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/medhabangla
      dockerfile: Dockerfile.frontend
    volumes:
      - ./frontend/medhabangla:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  postgres_data:
