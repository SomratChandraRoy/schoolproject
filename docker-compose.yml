services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medhabangla_db}
      POSTGRES_USER: ${POSTGRES_USER:-medhabangla_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medhabangla_password}
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DOCKER_ENV=True
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-medhabangla_db}
      - DB_USER=${POSTGRES_USER:-medhabangla_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-medhabangla_password}
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOW_ALL_ORIGINS=True
      - JAAS_DOMAIN=${JAAS_DOMAIN:-8x8.vc}
      - JAAS_APP_ID=${JAAS_APP_ID:-}
      - JAAS_KID=${JAAS_KID:-}
      - JAAS_PRIVATE_KEY=${JAAS_PRIVATE_KEY:-}
      - JAAS_JWT_TTL_SECONDS=${JAAS_JWT_TTL_SECONDS:-3600}
      - JAAS_REQUIRE_AUTH_TOKEN=${JAAS_REQUIRE_AUTH_TOKEN:-False}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend/medhabangla
      dockerfile: Dockerfile.frontend
    volumes:
      - ./frontend/medhabangla:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
